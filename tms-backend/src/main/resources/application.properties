spring.application.name=tms
springdoc.swagger-ui.path=/swagger-ui.html

# ====================================================================
# DATABASE — driven entirely by environment variables.
# Defaults are local-dev fallbacks only. NEVER commit production secrets.
# ====================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/TMS?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ====================================================================
# JWT — secret MUST be set via env in production. 24-hour expiry.
# ====================================================================
jwt.secret=${JWT_SECRET:fdd50500942e3992acc7fcda436a46fb65d05617db26337a98685e8432d997f8}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ====================================================================
# MAIL — Gmail SMTP. Use an app-password.
# ====================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

# ====================================================================
# UPLOAD — max attachment size (bytes). Spring rejects above this.
# ====================================================================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:16MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:32MB}
tms.attachment.max-size-bytes=${TMS_MAX_ATTACHMENT_BYTES:16777216}

# ====================================================================
# CORS — comma-separated origin list. Override per-environment.
# ====================================================================
tms.cors.allowed-origins=${TMS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
tms.base-url=${TMS_BASE_URL:http://localhost:5173}

# ====================================================================
# SERVER
# ====================================================================
server.port=${PORT:8081}

# ====================================================================
# ACTUATOR — expose health for deployment health checks
# ====================================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false
