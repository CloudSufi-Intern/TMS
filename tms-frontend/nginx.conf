server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache static assets aggressively, but always fetch index.html fresh
  # so users pick up new deploys immediately.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Single-page app — every unknown route falls back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # gzip
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
