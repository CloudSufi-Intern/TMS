services:
  db:
    image: mysql:8.0
    container_name: tms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-TMS}
      MYSQL_USER: ${MYSQL_USER:-tmsuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tmspass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - tms-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./tms-backend
      dockerfile: Dockerfile
    container_name: tms-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-TMS}?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      SPRING_JPA_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-replace-in-production-with-something-much-longer-and-random}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      TMS_BASE_URL: ${TMS_BASE_URL:-http://localhost:3000}
      TMS_CORS_ALLOWED_ORIGINS: ${TMS_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      TMS_MAX_ATTACHMENT_BYTES: "16777216"
      MAX_FILE_SIZE: "16MB"
      MAX_REQUEST_SIZE: "32MB"
      PORT: "8080"
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./tms-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: tms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  tms-mysql-data:
